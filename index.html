<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Contact Me | Links</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;1,9..40,300&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Outfit', 'sans-serif'],
            body: ['DM Sans', 'sans-serif'],
          },
          colors: {
            bg: '#080810',
          },
          keyframes: {
            spin: { to: { transform: 'rotate(360deg)' } },
            fadeUp: {
              from: { opacity: '0', transform: 'translateY(24px)' },
              to:   { opacity: '1', transform: 'translateY(0)' },
            },
            pulse2: {
              '0%, 100%': { opacity: '1', transform: 'scale(1)' },
              '50%':       { opacity: '0.6', transform: 'scale(0.85)' },
            },
            shimmer: {
              '0%':   { backgroundPosition: '-200% center' },
              '100%': { backgroundPosition: '200% center' },
            }
          },
          animation: {
            spin:    'spin 6s linear infinite',
            fadeUp:  'fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both',
            fadeUp1: 'fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both',
            fadeUp2: 'fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.15s both',
            fadeUp3: 'fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both',
            fadeUp4: 'fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.25s both',
            fadeUp5: 'fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both',
            pulse2:  'pulse2 2s ease-in-out infinite',
          },
        }
      }
    }
  </script>
  <style>
      * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
      body {
          background-color: #080810;
          font-family: 'DM Sans', sans-serif;
          min-height: 100vh;
          overflow-x: hidden;
      }

      /* Noise overlay for texture */
      body::before {
          content: '';
          position: fixed;
          inset: 0;
          z-index: 1;
          pointer-events: none;
          background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      }

      /* Ambient orbs - adjusted for better mobile spread */
      .orb {
          position: fixed;
          border-radius: 50%;
          pointer-events: none;
          z-index: 0;
          filter: blur(100px);
      }

      /* Avatar ring spin */
      .avatar-ring { animation: spin 8s linear infinite; }

      /* Glassmorphism Link Card */
      .link-card {
          background: rgba(255, 255, 255, 0.03);
          backdrop-filter: blur(16px);
          -webkit-backdrop-filter: blur(16px);
          border: 1px solid rgba(255, 255, 255, 0.08);
          transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
      }

      /* Active state is crucial for mobile touch feedback */
      .link-card:active {
          transform: scale(0.96);
          background: rgba(255, 255, 255, 0.06);
      }

      /* Desktop hover effects (graceful degradation on mobile) */
      @media (hover: hover) {
          .link-card:hover {
              transform: translateY(-4px);
              background: rgba(255, 255, 255, 0.05);
              border-color: rgba(255, 255, 255, 0.2);
          }
          .link-card:hover .logo-icon { transform: scale(1.1) rotate(-3deg); }
          .link-card:hover .arrow-icon { transform: translateX(6px); opacity: 1; color: white;}

          /* Glow effects on hover */
          .fb-card:hover { box-shadow: 0 10px 30px -10px rgba(24,119,242,0.3); }
          .ig-card:hover { box-shadow: 0 10px 30px -10px rgba(225,48,108,0.3); }
          .gh-card:hover { box-shadow: 0 10px 30px -10px rgba(255,255,255,0.1); }
          .tiktok-card:hover { box-shadow: 0 10px 30px -10px rgba(0,242,234,0.2); }
          .locket-card:hover { box-shadow: 0 10px 30px -10px rgba(245,183,0,0.2); }
      }

      .logo-icon { transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
      .arrow-icon { transition: all 0.3s ease; opacity: 0.4; }

      /* Shimmer Text */
      .shimmer-text {
          background: linear-gradient(90deg, #fff 0%, #a78bfa 40%, #fff 60%, #e2e0ff 100%);
          background-size: 200% auto;
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          animation: shimmer 3.5s linear infinite;
      }

      /* Footer animations */
      @keyframes heartbeat {
          0%, 100% { transform: scale(1); }
          15% { transform: scale(1.25); }
          30% { transform: scale(1); }
          45% { transform: scale(1.15); }
          60% { transform: scale(1); }
      }
      .heart-beat { display: inline-block; animation: heartbeat 2s ease-in-out infinite; }

      @keyframes floatUp {
          0%, 100% { transform: translateY(0); opacity: 0.3; }
          50% { transform: translateY(-5px); opacity: 0.6; }
      }
      .footer-wrap { animation: floatUp 4s ease-in-out infinite; }
  </style>
</head>
