  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;1,9..40,300&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Outfit', 'sans-serif'],
            body: ['DM Sans', 'sans-serif'],
          },
          colors: {
            bg: '#080810',
            surface: '#0f0f1a',
            card: '#13131f',
            border: 'rgba(255,255,255,0.06)',
          },
          keyframes: {
            spin: { to: { transform: 'rotate(360deg)' } },
            fadeUp: {
              from: { opacity: '0', transform: 'translateY(24px)' },
              to:   { opacity: '1', transform: 'translateY(0)' },
            },
            pulse2: {
              '0%, 100%': { opacity: '1' },
              '50%':       { opacity: '0.4' },
            },
            shimmer: {
              '0%':   { backgroundPosition: '-200% center' },
              '100%': { backgroundPosition: '200% center' },
            }
          },
          animation: {
            spin:    'spin 6s linear infinite',
            fadeUp:  'fadeUp 0.6s ease both',
            fadeUp1: 'fadeUp 0.55s 0.10s ease both',
            fadeUp2: 'fadeUp 0.55s 0.18s ease both',
            fadeUp3: 'fadeUp 0.55s 0.26s ease both',
            fadeUp4: 'fadeUp 0.55s 0.34s ease both',
            fadeUp5: 'fadeUp 0.55s 0.42s ease both',
            pulse2:  'pulse2 2.5s ease-in-out infinite',
          },
        }
      }
    }
  </script>
  <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
          background-color: #080810;
          font-family: 'DM Sans', sans-serif;
          min-height: 100vh;
      }

      /* Grain overlay */
      body::before {
          content: '';
          position: fixed;
          inset: 0;
          z-index: 1;
          pointer-events: none;
          background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
          opacity: 0.4;
      }

      /* Ambient orbs */
      .orb {
          position: fixed;
          border-radius: 50%;
          pointer-events: none;
          z-index: 0;
          filter: blur(90px);
      }

      /* Avatar ring spin */
      .avatar-ring { animation: spin 7s linear infinite; }

      /* Link card hover */
      .link-card {
          transition: transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1),
          border-color 0.22s ease,
          box-shadow 0.22s ease;
          -webkit-tap-highlight-color: transparent;
      }
      .link-card:hover {
          transform: translateY(-3px) scale(1.01);
          border-color: rgba(255,255,255,0.13) !important;
      }
      .link-card:active { transform: scale(0.975); }

      /* Logo icons hover */
      .logo-icon {
          transition: transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .link-card:hover .logo-icon { transform: scale(1.08); }

      /* Arrow slide */
      .arrow-icon {
          transition: transform 0.22s ease, opacity 0.22s ease;
          opacity: 0.35;
      }
      .link-card:hover .arrow-icon {
          transform: translateX(4px);
          opacity: 0.7;
      }

      /* Shimmer on name */
      .shimmer-text {
          background: linear-gradient(90deg, #e2e0ff 0%, #fff 30%, #c4b5fd 60%, #fff 80%, #e2e0ff 100%);
          background-size: 200% auto;
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          background-clip: text;
          animation: shimmer 4s linear infinite;
      }

      /* Footer heartbeat */
      @keyframes heartbeat {
          0%, 100% { transform: scale(1); }
          14%       { transform: scale(1.3); }
          28%       { transform: scale(1); }
          42%       { transform: scale(1.2); }
          70%       { transform: scale(1); }
      }
      .heart-beat { display: inline-block; animation: heartbeat 1.8s ease-in-out infinite; }

      /* Footer float */
      @keyframes floatUp {
          0%, 100% { transform: translateY(0); opacity: 0.22; }
          50%       { transform: translateY(-4px); opacity: 0.38; }
      }
      .footer-wrap { animation: floatUp 3.5s ease-in-out infinite; }

      /* FB glow on hover */
      .fb-card:hover .logo-icon { box-shadow: 0 0 20px rgba(24,119,242,0.5); }
      /* IG glow */
      .ig-card:hover .logo-icon { box-shadow: 0 0 20px rgba(225,48,108,0.45); }
      /* GH glow */
      .gh-card:hover .logo-icon { box-shadow: 0 0 16px rgba(200,200,200,0.2); }
      /* Locket glow */
      .locket-card:hover .logo-icon { box-shadow: 0 0 22px rgba(255,190,0,0.55); }
      /* TikTok glow */
      .tiktok-card:hover .logo-icon { box-shadow: 0 0 18px rgba(0,242,234,0.4); }
  </style>
